# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "muuuuuuushroom"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# project page: https://muuuuuuushroom.github.io/cv-arxiv-daily/
# keywords to search
keywords:
  "LLM":
      filters: ["Large Language Model", "LLM", "Language Model", "Transformer", "Pre-training", "Fine-tuning"]
  "Agent":
      filters: ["Agent", "Agentic RL","Autonomous Agent", "Multi-agent", "AI Agent", "Agentic", "Agent Architecture"]
  "Counting":
      filters: ["Counting", "Crowd Counting", "class-agnostic counting", "referring expression counting", "multimodal counting"]
  "VTON":
      filters: ["Virtual Try-On", "VTON", "Clothing Try-On", "3D Virtual Try-On", "Multi-view Virtual Try-On", "Try-On Synthesis"]
  "Multi-modal":
      filters: ["multi-modal", "multi-modality", "multi-modal learning", "multi-modal fusion", "multi-modal representation"]
